_target_: src.data.tuh_eeg_epilepsy_datamodule.TUHEEGDataModule
data_dir: ${paths.data_dir}
version: 'v3.0.0'
train_val_test_split: [0.8, 0.1, 0.1]
window_len_min: 5 # 5 minutes
dict_learning_window_len_s: 2.0 # window length (seconds) for the dictionary-learning pass
overlap_pct: 0.0
signal_mode: raw # 'raw' (sensor EEG) | 'ica_clean' (keep ICs in ica_keep_labels, back-projected)
ica_keep_labels: [brain, other] # ICLabel categories kept when signal_mode=ica_clean
# (excludes the confident artifacts: muscle, eye, heart, line noise, channel noise)
batch_size: 32 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
num_workers: 7
seed: 42
pin_memory: False