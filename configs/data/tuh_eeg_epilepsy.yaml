_target_: src.data.tuh_eeg_epilepsy_datamodule.TUHEEGDataModule
data_dir: ${paths.data_dir}
version: 'v3.0.0'
train_val_test_split: [0.6, 0.2, 0.2] # subject-level (stratified by epilepsy); train+val are merged for fitting, so effectively 80/20 train/test
window_len_min: 2 # 2 minutes
include_seizures: false # include recordings that contain seizures in the window plan/split. false = interictal only (drop any recording with a seizure annotation, n_seizure>0); the classification task is epilepsy diagnosis, not seizure detection.
target_sfreq: 256 # resample every window to this rate (Hz), matching the PSD precompute (--target_sfreq) and the bipolar/BioFundation preprocessing. Set null to fall back to the corpus-min sfreq (no upsampling).
dict_learning_window_len_s: 2.0 # window length (seconds) for the dictionary-learning pass
build_dict_learning_set: false # load the (currently unused) dictionary-learning short-window set; off saves EDF reads + RAM
lazy_loading: false # stream windows from disk on demand (O(batch) RAM) instead of materializing all upfront; supports signal_mode raw/bipolar/ica_clean/brain_ic/ic_bag
# Reuse a fixed window set for reproducibility / identical windows across signal
# modes: point these at a previous run's windows_{train,val,test}.csv. When all
# three are set the plan is loaded from them instead of generated (requires
# lazy_loading). Provide all three or none.
windows_train_csv: null
windows_val_csv: null
windows_test_csv: null
# Keep only recordings whose ICA has >=1 IC in these labels (scanned from the
# -ica_labels.csv files), applied before windowing. Set the SAME value across all
# signal modes (e.g. [brain]) so raw / brain_ic / ic_bag use identical windows.
# null = no filter. Independent of ica_keep_labels.
require_keep_labels: null
# Drop specific recordings from the pool before windowing: path to a text file of EDF
# paths (one per line, '#' comments ignored), e.g. the PSD anomalies selected by
# build_psd_exclusion.py. null = no exclusion. e.g.
# data.exclude_recordings_file=diagnostics/psd/exclude_recordings.txt
exclude_recordings_file: null
# Bad-channel / bad-segment repair from the -bads.json sidecars (precompute_badchannels.py).
# interpolate_bad_channels: spherical-spline interpolate flagged channels before the bipolar
# montage (recordings with too many bad channels are dropped instead). drop_bad_segments: drop
# windows overlapping a flagged high-amplitude/flat segment. Both require lazy_loading=true and
# a prior `python src/precompute_badchannels.py` pass. Both null/false = no repair.
interpolate_bad_channels: false
drop_bad_segments: false
# Drop windows overlapping a seizure span (.csv_bi label 'seiz'). Pair with include_seizures=true
# to keep a seizure recording's interictal (bckg) windows instead of dropping the whole recording
# (include_seizures=false). Needs lazy_loading=true; no precompute needed (reads .csv_bi directly).
drop_seizure_segments: false
overlap_pct: 0.0
# Per-subject window cap. null = strict balancing (every subject clamped to the
# global-minimum subject's window count, which discards most of the corpus). Set
# an integer (e.g. 20) for soft balancing: keep min(actual, cap) per subject, so
# short subjects keep all and long ones are capped. The run log prints a "Window
# budget: kept / available" line so the effect is visible.
max_windows_per_subject: null
signal_mode: raw # 'raw' (sensor EEG) | 'bipolar' (raw re-referenced to the TCP double-banana bipolar montage; ~22 channels, for noise rejection / spike localization) | 'ica_clean' (keep ICs in ica_keep_labels, back-projected) | 'brain_ic' (region-binned IC sources) | 'ic_bag' (padded bag of IC sources; pair with feature=ic_bag_transformer)
# Apply the TCP bipolar montage AFTER building the sensor-space signal. Orthogonal to
# signal_mode: composes with 'raw' (same as signal_mode=bipolar) or 'ica_clean'
# (bipolarize the reconstructed signal). No effect on brain_ic / ic_bag (not sensor-space).
bipolar: false
# Notch filter (Hz) applied to the sensor-space signal (raw / bipolar / ica_clean) per
# window. null = no notch. Set to [60, 120] to suppress 60 Hz mains line noise and
# its first harmonic, e.g. data.notch_freqs=[60,120].
notch_freqs: null
# Band-pass [l_freq, h_freq] (Hz) applied to the sensor-space signal (raw / bipolar /
# ica_clean) per window, before features. null = no band-pass (full band). Use to
# equalize bandwidth across recordings of different native sfreq (the high-frequency
# content above ~100 Hz is a class confound; see plot_sfreq.py). The IC-labels pipeline
# uses [1, 100]; BioFundation uses [0.1, 75]. e.g. data.filter_freq=[1,100].
filter_freq: null
ica_keep_labels: [brain, other] # ICLabel categories kept when signal_mode=ica_clean or brain_ic
# (ica_clean excludes the confident artifacts: muscle, eye, heart, line noise, channel noise;
#  brain_ic uses these labels' ICs directly, so set [brain] for brain-only regional sources)
brain_ic_min_gof: 0.0 # brain_ic: drop ICs whose dipole goodness of fit (percent) is below this (0 = keep all)
brain_ic_use_dipoles: true # brain_ic: assign regions from cached dipoles (-ica_dipoles.csv); false uses the dominant-electrode heuristic
ic_bag_max_k: 20 # ic_bag: IC slots per window (pad/truncate); memory ~ max_k channels
ic_bag_sign_normalize: true # ic_bag: sign-normalize sources by topography
ic_bag_rank_by: variance # ic_bag: rank ICs for top-k selection (variance | prob); used only when K > max_k
batch_size: 32 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
num_workers: 7
seed: 42
pin_memory: False