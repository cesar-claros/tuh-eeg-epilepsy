_target_: src.data.tuh_eeg_epilepsy_datamodule.TUHEEGDataModule
data_dir: ${paths.data_dir}
version: 'v3.0.0'
train_val_test_split: [0.8, 0.1, 0.1]
window_len_min: 5 # 5 minutes
dict_learning_window_len_s: 2.0 # window length (seconds) for the dictionary-learning pass
build_dict_learning_set: false # load the (currently unused) dictionary-learning short-window set; off saves EDF reads + RAM
lazy_loading: false # stream windows from disk on demand (O(batch) RAM) instead of materializing all upfront; supports signal_mode raw/brain_ic
overlap_pct: 0.0
# Per-subject window cap. null = strict balancing (every subject clamped to the
# global-minimum subject's window count, which discards most of the corpus). Set
# an integer (e.g. 20) for soft balancing: keep min(actual, cap) per subject, so
# short subjects keep all and long ones are capped. The run log prints a "Window
# budget: kept / available" line so the effect is visible.
max_windows_per_subject: null
signal_mode: raw # 'raw' (sensor EEG) | 'ica_clean' (keep ICs in ica_keep_labels, back-projected) | 'brain_ic' (region-binned IC sources)
ica_keep_labels: [brain, other] # ICLabel categories kept when signal_mode=ica_clean or brain_ic
# (ica_clean excludes the confident artifacts: muscle, eye, heart, line noise, channel noise;
#  brain_ic uses these labels' ICs directly, so set [brain] for brain-only regional sources)
brain_ic_min_gof: 0.0 # brain_ic: drop ICs whose dipole goodness of fit (percent) is below this (0 = keep all)
brain_ic_use_dipoles: true # brain_ic: assign regions from cached dipoles (-ica_dipoles.csv); false uses the dominant-electrode heuristic
batch_size: 32 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
num_workers: 7
seed: 42
pin_memory: False