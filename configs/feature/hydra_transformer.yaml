_target_: src.models.components.hydra_transformer.HydraTransformer
n_kernels : 8
n_groups : 64
max_num_channels : 8
random_state : 42
n_jobs : 12
# Accumulate per-kernel win counts during feature extraction so the most-used
# kernels can be ranked and inspected (diagnostic only; does not change features).
track_counts : false
# Device for the HYDRA convolutions: cpu | cuda | cuda:N | auto. Use cuda to
# accelerate feature extraction on a GPU (features are moved back to CPU for the
# sklearn classifier). Kernels are generated on CPU first, so results are
# reproducible across devices for a given random_state.
device : auto
