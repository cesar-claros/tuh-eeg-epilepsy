_target_: src.models.components.ic_bag_transformer.ICBagTransformer
n_kernels : 8
n_groups : 64
random_state : 42
n_jobs : 12
# Device for the underlying (univariate) HYDRA: cpu | cuda | cuda:N | auto.
device : auto
# Pooling operators over the IC axis (any subset of mean / max / std). 'max' is
# the focal-source detector ("does any IC look epileptiform?"). Output dim is
# len(pool) * d, where d is the univariate-HYDRA feature dimension.
pool : [mean, max, std]
# Append the per-window valid-IC count as one extra feature.
append_count : false
# IC-instances per HYDRA pass. The per-IC reshape inflates the batch by max_k, so
# this bounds the conv1d GPU memory. Lower it on CUDA OOM, raise for speed.
ic_chunk_size : 32
