# Default training model: L1-regularized logistic regression. L1 drives many kernel
# coefficients to exactly 0, so it performs sparse feature (kernel) selection instead
# of dense L2 shrinkage. Useful for sharpening the classifier-weighted kernel ranking
# (top_classifier_kernels): only the kernels with nonzero weights are kept, the rest
# get importance 0. (Switch back to L2 with `python src/train.py model=logistic_regression`.)
_target_: sklearn.linear_model.LogisticRegressionCV
penalty: l1            # L1 (sparse). The L2 logistic_regression / ridge configs use the dense penalty.
solver: liblinear      # liblinear / saga are the only solvers that support L1 (lbfgs does not).
                       # liblinear is fast and robust for binary L1; switch to saga for very
                       # large window counts (and raise max_iter if it warns about convergence).
# CV objective: optimize SENSITIVITY = recall of the positive class (epilepsy = label 1),
# so the C that catches the most epilepsy cases is chosen. Caveat: recall-only selection
# tends to over-predict positive and can lower specificity under the window-level class
# imbalance; pair with model.class_weight=balanced, or use scoring=balanced_accuracy, to
# trade some sensitivity back for specificity.
scoring: recall
cv: 5
Cs:
  _target_: numpy.logspace
  start: -3
  stop: 3
  num: 10
n_jobs: -1
max_iter: 500
verbose: 1
# null = unweighted (default). Set to 'balanced' to counteract window-level class
# imbalance (epilepsy windows outnumber non-epilepsy, more so at higher
# max_windows_per_subject), which otherwise biases the decision threshold toward
# the positive class (high sensitivity, low specificity). Override on the CLI with
# model.class_weight=balanced.
class_weight: null
