# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_
  - data: tuh_eeg_epilepsy
  - feature: hydra_transformer
  - scaler: sparse_scaler
  - model: logistic_regression
  - trainer: sklearn
  - paths: default
  - extras: default
  - hydra: default

  # optional local config for machine/user specific settings
  # it's optional since it doesn't need to exist and is excluded from version control
  - optional local: default

# task name, determines output directory path
task_name: "train"

# Output directory for this run. Defaults to a timestamped path under
# logs/${task_name}/runs/. Override from the command line to send all run
# artifacts (model.joblib, performance.csv, windows_*.csv, logs, and the resolved
# config) to a folder you choose, e.g.:
#   python src/train.py output_dir=/scratch/me/run_01
# It feeds hydra.run.dir, so paths.output_dir resolves to the same folder.
output_dir: ${paths.log_dir}/${task_name}/runs/${paths.timestamp}

# tags to help you identify your experiments
# overwrite from command line with `uv run train.py tags="[first_tag, second_tag]"`
tags: ["dev"]

# set False to skip model training
train: True

# evaluate on test set, using best model weights achieved during training
# lightning chooses best weights based on the metric specified in checkpoint callback
test: True

# simply provide checkpoint path to resume training
ckpt_path: null

# seed for random number generators in pytorch, numpy and python.random
seed: null

# multi-seed evaluation of the random HYDRA feature kernels, to quantify how much
# accuracy varies with the kernel seed (feature.random_state) while the data split
# is held fixed. Examples:
#   null            -> single run (uses feature.random_state)
#   feature_seeds=10 -> sweep seeds 0..9
#   feature_seeds=[1,7,42] -> sweep the listed seeds
# Writes seed_sweep_results.csv and seed_sweep_summary.csv to the run output dir.
feature_seeds: null

# When feature.track_counts is enabled, report the most-used and most
# class-discriminative kernels after training (writes top_kernels.csv and
# top_discriminative_kernels.csv to the run output dir, and logs the top 5).
# Independently, the fitted linear classifier's weights are used to rank the
# kernels it relies on most (top_classifier_kernels.csv); this does not need win
# counts but is only emitted alongside the others (track_counts=true triggers all).
top_kernels:
  n: 20                 # top-N by |score| for the global top_kernels.csv
  n_per_class: 5        # kernels per class shown in the discriminative plot
  n_hist_per_class: 100 # kernels per class for the peak-frequency histogram + CSV
  by: max               # max | min | total
  weighting: frequency  # frequency | magnitude
  metric: difference    # difference | ratio | logodds  (discriminative only)
  clf_combine: sum      # aggregate a kernel's 2 feature columns: sum | max  (classifier ranking)
